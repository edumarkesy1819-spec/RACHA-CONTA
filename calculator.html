<!DOCTYPE html>

<html lang="pt-br"><head>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Racha Conta</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Racha Conta">
<link rel="apple-touch-icon" href="icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8EBCCF", // Blue action button
                        "input-blue": "#B7D8E8",
                        "selection-pink": "#EAC8CA",
                        "background-light": "#FDFCF8", // Cream background
                        "background-dark": "#15171d",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .active-pink { background-color: #EAC8CA !important; }
        .input-soft-blue { background-color: #B7D8E8; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body id="screen-calculator" class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full max-w-[480px] mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Header -->
<header class="flex items-center justify-between px-6 pt-8 pb-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300 text-3xl">receipt_long</span>
<h1 class="text-xl font-bold tracking-tight text-slate-800 dark:text-slate-100">Racha Conta</h1>
</div>
<button class="p-2 rounded-full hover:bg-slate-200/50 transition-colors">
<span class="material-symbols-outlined text-slate-600">more_vert</span>
</button>
</header>
<main class="flex-1 px-6 py-4 flex flex-col gap-8">
<!-- Name Section -->
<section>
<label class="block text-sm font-semibold uppercase tracking-wider text-slate-500 mb-3 ml-1">Nome do Local (Opcional)</label>
<div class="relative flex items-center">
<input id="calc-name" class="w-full h-14 px-4 text-lg font-bold rounded-2xl border-none input-soft-blue text-slate-800 focus:ring-2 focus:ring-primary/50 transition-all" placeholder="Ex: Pizzaria" type="text"/>
</div>
</section>
<!-- Total Bill Section -->
<section>
<label class="block text-sm font-semibold uppercase tracking-wider text-slate-500 mb-3 ml-1">Total da Conta</label>
<div class="relative flex items-center">
<span class="absolute left-4 text-slate-500 font-semibold">R$</span>
<input id="calc-total" class="w-full h-16 pl-12 pr-4 text-2xl font-bold rounded-2xl border-none input-soft-blue text-slate-800 focus:ring-2 focus:ring-primary/50 transition-all" placeholder="0,00" type="number" value="160.04"/>
</div>
</section>
<!-- Tip Selection Section -->
<section>
<label class="block text-sm font-semibold uppercase tracking-wider text-slate-500 mb-3 ml-1">Gorjeta</label>
<div class="grid grid-cols-4 gap-3">
<button class="tip-btn h-12 rounded-xl bg-slate-100 dark:bg-slate-800 font-medium text-slate-600 dark:text-slate-300 hover:bg-selection-pink transition-colors" data-tip="5">5%</button>
<button class="tip-btn h-12 rounded-xl active-pink font-bold text-slate-800 shadow-sm border border-selection-pink/20" data-tip="10">10%</button>
<button class="tip-btn h-12 rounded-xl bg-slate-100 dark:bg-slate-800 font-medium text-slate-600 dark:text-slate-300 hover:bg-selection-pink transition-colors" data-tip="15">15%</button>
<button class="tip-btn h-12 rounded-xl bg-slate-100 dark:bg-slate-800 font-medium text-slate-600 dark:text-slate-300 hover:bg-selection-pink transition-colors" data-tip="20">20%</button>
</div>
</section>
<!-- People Selection Section -->
<section>
<div class="flex justify-between items-end mb-3 ml-1 pr-1">
<label class="block text-sm font-semibold uppercase tracking-wider text-slate-500">Quem vai dividir?</label>
<span id="people-count" class="text-primary font-bold text-sm">1 Selecionado</span>
</div>
<div id="calc-friends-list" class="flex flex-wrap gap-2">
<!-- Populated by JS -->
</div>
</section>
<!-- Action Button -->
<button id="btn-calculate" class="w-full h-16 bg-primary hover:bg-primary/90 text-white text-lg font-bold rounded-2xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">calculate</span>
                Calcular
            </button>
<!-- Results Section -->
<section class="mt-4 flex flex-col items-center justify-center bg-white dark:bg-slate-800/50 rounded-[2rem] p-8 border border-slate-100 dark:border-slate-800">
<p class="text-slate-500 font-medium mb-2">Total por pessoa</p>
<div id="display-total-person" class="text-5xl font-black text-slate-900 dark:text-white tracking-tight">
<span class="text-2xl align-top mr-1">R$</span>40,01
                </div>
</section>
</main>
<!-- Bottom Navigation -->
<nav class="sticky bottom-0 w-full flex border-t border-slate-100 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 py-4 justify-around items-center">
<a class="flex flex-col items-center gap-1 text-slate-400 transition-colors" href="history.html">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-bold uppercase">Histórico</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary transition-colors" href="calculator.html">
<div class="bg-primary/10 p-2 rounded-xl">
<span class="material-symbols-outlined !fill-1">calculate</span>
</div>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 transition-colors" href="settings.html">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold uppercase">Ajustes</span>
</a>
</nav>
</div>
<script src="js/app.js"></script>
</body></html>
