<!DOCTYPE html>

<html lang="en"><head>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Racha Conta</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Racha Conta">
<link rel="apple-touch-icon" href="icon-512.png">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13a4ec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101c22",
                        "light-muted-blue": "#B7D8E8",
                        "soft-muted-blue": "#8EBCCF",
                        "soft-dusty-pink": "#EAC8CA",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body id="screen-settings" class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex justify-center">
<div class="relative flex h-auto min-h-screen w-full max-w-md flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Header -->
<div class="flex items-center p-4 pb-2 justify-between sticky top-0 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur z-10">
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight tracking-tight flex-1 text-center">Ajustes</h2>
</div>
<!-- Main Content Scrollable Area -->
<div class="flex-1 overflow-y-auto pb-24">
<!-- PIX Section -->
<div class="px-4 pt-6">
<h3 class="text-slate-500 dark:text-slate-400 text-sm font-semibold leading-tight tracking-wider uppercase mb-3">MINHA CHAVE PIX</h3>
<div class="flex flex-col gap-4">
<label class="flex flex-col w-full">
<input id="settings-pix-input" class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 focus:outline-0 focus:ring-2 focus:ring-primary border-none bg-light-muted-blue dark:bg-slate-800 h-14 placeholder:text-slate-600 dark:placeholder:text-slate-400 px-4 text-base font-normal leading-normal transition-shadow" placeholder="Sua chave PIX (CPF, E-mail, etc.)" value=""/>
</label>
</div>
</div>
<!-- Frequent Friends Section -->
<div class="px-4 pt-8">
<h3 class="text-slate-500 dark:text-slate-400 text-sm font-semibold leading-tight tracking-wider uppercase mb-3">AMIGOS FREQUENTES</h3>
<!-- Add Friend Input -->
<div class="relative w-full mb-4">
<input id="settings-friend-input" class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 focus:outline-0 focus:ring-2 focus:ring-primary border-none bg-light-muted-blue dark:bg-slate-800 h-14 placeholder:text-slate-600 dark:placeholder:text-slate-400 pl-4 pr-14 text-base font-normal leading-normal transition-shadow" placeholder="Adicionar amigo..." value=""/>
<button id="btn-add-friend" class="absolute right-2 top-1/2 -translate-y-1/2 h-10 w-10 flex items-center justify-center rounded-lg bg-soft-muted-blue text-slate-900 hover:bg-opacity-80 transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
</div>
<!-- Friends List Pills -->
<div id="settings-friends-list" class="flex flex-wrap gap-2">
<!-- Populated by JS -->
</div>
</div>
</div>
<!-- Bottom NavBar -->
<div class="fixed bottom-0 w-full max-w-md bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 px-4 pb-safe pt-2 z-20">
<div class="flex gap-2 pb-3">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors" href="history.html">
<div class="flex h-10 w-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
<span class="material-symbols-outlined text-2xl">history</span>
</div>
<span class="text-xs font-medium">Histórico</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors" href="calculator.html">
<div class="flex h-10 w-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
<span class="material-symbols-outlined text-2xl">calculate</span>
</div>
<span class="text-xs font-medium">Calcular</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="settings.html">
<div class="flex h-10 w-10 items-center justify-center rounded-full bg-primary/10">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">settings</span>
</div>
<span class="text-xs font-medium">Ajustes</span>
</a>
</div>
<!-- iOS Home Indicator Space -->
<div class="h-5"></div>
</div>
</div>
<script src="js/app.js"></script>
</body></html>
